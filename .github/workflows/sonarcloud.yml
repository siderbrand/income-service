name: SonarCloud Analysis

on:
  push:
    branches: [ main, develop, feature/additional-sonar-config ]
  pull_request:
    branches: [ main, develop, feature/additional-sonar-config ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    # Only run Sonar on push events (trusted) or PRs from the same repo
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and analyze (with SonarCloud)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Event: $GITHUB_EVENT_NAME"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Running PR analysis"
            ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
              -Dsonar.projectKey=fabrica-escuela_income-service \
              -Dsonar.organization=fabrica-escuela \
              -Dsonar.pullrequest.key=${{ github.event.number }} \
              -Dsonar.pullrequest.branch=${{ github.head_ref }} \
              -Dsonar.pullrequest.base=${{ github.base_ref }}
          else
            echo "Running branch analysis for ${{ github.ref_name }}"
            ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar \
              -Dsonar.projectKey=fabrica-escuela_income-service \
              -Dsonar.organization=fabrica-escuela \
              -Dsonar.branch.name=${{ github.ref_name }}
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
