spring:
  application:
    name: income-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/income_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html